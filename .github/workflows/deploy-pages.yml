name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run validation suite
        id: validation
        shell: bash
        run: |
          set +e
          mkdir -p ci-diagnostics

          npm test 2>&1 | tee ci-diagnostics/tests.log
          TEST_EXIT=${PIPESTATUS[0]}

          npm run balance:check 2>&1 | tee ci-diagnostics/balance.log
          BALANCE_EXIT=${PIPESTATUS[0]}

          node --input-type=module -e "
          await import('./src/backend/GameController.js');
          await import('./src/frontend/BattlefieldRenderer.js');
          await import('./src/frontend/CombatEventPresenter.js');
          await import('./src/frontend/GameView.js');
          await import('./src/model/StrategyGameModel.js');
          " 2>&1 | tee ci-diagnostics/module-graph.log
          MODULE_EXIT=${PIPESTATUS[0]}

          cat > ci-diagnostics/summary.json <<EOF
          {
            "tests": ${TEST_EXIT},
            "balance": ${BALANCE_EXIT},
            "moduleGraph": ${MODULE_EXIT}
          }
          EOF

          if (( TEST_EXIT != 0 || BALANCE_EXIT != 0 || MODULE_EXIT != 0 )); then
            exit 1
          fi

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: ci-diagnostics
          if-no-files-found: warn

      - name: Configure Pages
        if: success()
        uses: actions/configure-pages@v5

      - name: Build static site
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          SHORT_SHA="${GITHUB_SHA::7}"

          mkdir -p dist
          cp -R assets dist/assets
          TITLE_TRACK="$(find . -type f -iname '*.mp3' -not -path './dist/*' -print | sort | head -n 1)"
          if [[ -n "${TITLE_TRACK}" ]]; then
            cp "${TITLE_TRACK}" dist/assets/title-theme.mp3
          fi
          cp -R src "dist/src-${SHORT_SHA}"
          sed "s/__BUILD_ID__/${SHORT_SHA}/g" index.html > dist/index.html

          cat > dist/build-info.json <<EOF
          {
            "version": "${VERSION}",
            "commit": "${SHORT_SHA}"
          }
          EOF

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download CI diagnostics
        uses: actions/download-artifact@v4
        with:
          name: ci-diagnostics
          path: ci-diagnostics
        continue-on-error: true

      - name: Publish CI receipt
        shell: bash
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          DEPLOYED_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          STATUS="failure"
          if [[ "${BUILD_RESULT}" == "success" && "${DEPLOY_RESULT}" == "success" ]]; then
            STATUS="success"
          fi

          TESTS="unknown"
          BALANCE="unknown"
          MODULE_GRAPH="unknown"
          if [[ -f ci-diagnostics/summary.json ]]; then
            TESTS="$(node -p "require('./ci-diagnostics/summary.json').tests")"
            BALANCE="$(node -p "require('./ci-diagnostics/summary.json').balance")"
            MODULE_GRAPH="$(node -p "require('./ci-diagnostics/summary.json').moduleGraph")"
          fi

          git checkout --orphan ci-status-output
          git rm -rf .
          mkdir -p diagnostics
          if [[ -d ci-diagnostics ]]; then
            cp -R ci-diagnostics/. diagnostics/
          fi

          cat > ci-status.json <<EOF
          {
            "commit": "${GITHUB_SHA}",
            "shortCommit": "${GITHUB_SHA::7}",
            "workflow": "${GITHUB_WORKFLOW}",
            "runId": "${GITHUB_RUN_ID}",
            "status": "${STATUS}",
            "buildResult": "${BUILD_RESULT}",
            "deployResult": "${DEPLOY_RESULT}",
            "testsExitCode": "${TESTS}",
            "balanceExitCode": "${BALANCE}",
            "moduleGraphExitCode": "${MODULE_GRAPH}",
            "deployedUrl": "${DEPLOYED_URL}"
          }
          EOF

          git add ci-status.json diagnostics
          git commit -m "Record CI result for ${GITHUB_SHA::7}"
          git push --force origin HEAD:ci-status
