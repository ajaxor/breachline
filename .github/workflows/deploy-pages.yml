name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run automated tests
        run: npm test

      - name: Validate application module graph
        run: >-
          node --input-type=module -e "
          await import('./src/backend/GameController.js');
          await import('./src/frontend/BattlefieldRenderer.js');
          await import('./src/frontend/GameView.js');
          await import('./src/model/StrategyGameModel.js');
          "

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          SHORT_SHA="${GITHUB_SHA::7}"

          mkdir -p dist
          cp -R assets dist/assets
          cp -R src "dist/src-${SHORT_SHA}"
          sed "s/__BUILD_ID__/${SHORT_SHA}/g" index.html > dist/index.html

          cat > dist/build-info.json <<EOF
          {
            "version": "${VERSION}",
            "commit": "${SHORT_SHA}"
          }
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
